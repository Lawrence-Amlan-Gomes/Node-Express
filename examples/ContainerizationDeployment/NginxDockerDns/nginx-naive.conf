# THE NAIVE CONFIG — what most Nginx-in-Docker tutorials show.
# No "resolver" line anywhere, and "app" is written as a plain, static
# hostname. Nginx resolves "app" to a real IP address ONE TIME — when this
# config is first loaded — and then keeps using that same IP forever, for
# every request, until Nginx itself is restarted or reloaded.
events {}

http {
  server {
    listen 80;

    location / {
      # A static hostname here gets resolved ONCE, at startup.
      # If the real container behind "app" is ever replaced (a redeploy,
      # a crash-restart, a rolling update), it gets a brand-new real IP —
      # but this Nginx never finds out, because it never looks again.
      proxy_pass http://app:3000;
      # A real, explicit timeout — without this, Nginx's attempt to
      # connect to a genuinely dead IP can hang far longer than you'd
      # expect before giving up, instead of failing fast.
      proxy_connect_timeout 3s;
    }
  }
}
