# THE FIX — same idea, one real difference.
# "resolver 127.0.0.11" tells Nginx to use DOCKER'S OWN real internal DNS
# server (every Docker container gets this exact address automatically)
# instead of resolving once and forgetting. "valid=5s" means: don't trust
# a looked-up IP for longer than 5 real seconds — look it up again after
# that, instead of caching it forever.
events {}

http {
  resolver 127.0.0.11 valid=5s;

  server {
    listen 80;

    location / {
      # Putting the hostname in a VARIABLE (not a plain string) is what
      # actually forces Nginx to use the "resolver" line above instead of
      # resolving once at startup like the naive config does. This one
      # real line is the entire fix.
      set $upstream_app app:3000;
      proxy_pass http://$upstream_app;
    }
  }
}
